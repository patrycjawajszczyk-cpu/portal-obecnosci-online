<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:#FAF8F5;min-height:100vh}
.pf{font-family:'Playfair Display',serif}
.btn{border:none;cursor:pointer;border-radius:8px;font-family:'Lato',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:11px 20px}
.btn:hover{opacity:.8}.btn:disabled{opacity:.4;cursor:not-allowed}
.bp{background:#AD6B68;color:#fff}.bs{background:transparent;color:#1A1A18;border:1.5px solid #C8BFB5}
.bg{background:#C9A84C;color:#1A1A18}.bd{background:#B94040;color:#fff}.bgh{background:transparent;color:#7A6E6A;border:1px solid #E0D8CE}
.card{background:#fff;border-radius:14px;border:1px solid #EAE4DC;box-shadow:0 2px 14px rgba(0,0,0,.05)}
.iw{display:flex;flex-direction:column;gap:5px}
.iw label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7A6E6A}
.iw input,.iw select{padding:10px 13px;border:1.5px solid #E0D8CE;border-radius:8px;font-family:'Lato',sans-serif;font-size:14px;color:#1A1A18;background:#fff;outline:none;width:100%}
.iw input:focus,.iw select:focus{border-color:#AD6B68}
.badge{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;display:inline-block}
.topbar{background:#fff;border-bottom:1px solid #EAE4DC;padding:15px 24px;display:flex;align-items:center;justify-content:space-between}
table{width:100%;border-collapse:collapse}
th{padding:11px 15px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:#2A2218;color:rgba(255,255,255,.65);white-space:nowrap}
td{padding:12px 15px;font-size:13px}
tr:nth-child(even) td{background:#FAF8F5}
tr:nth-child(odd) td{background:#fff}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@keyframes p2{0%,100%{box-shadow:0 0 0 4px rgba(173,107,104,.15)}50%{box-shadow:0 0 0 10px rgba(173,107,104,.04)}}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(26,26,24,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.group-card{background:#fff;border:1.5px solid #EAE4DC;border-radius:12px;padding:18px 22px;cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:left;width:100%;font-family:'Lato',sans-serif}
.group-card:hover{border-color:#AD6B68;box-shadow:0 4px 16px rgba(173,107,104,.15)}
.spinner{width:28px;height:28px;border:3px solid #EAE4DC;border-top-color:#AD6B68;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
</style>

  return(eh*60+em)-(sh*60+sm);
}
function isPast(s){
  if(!s.data_dzien1)return false;
  const dateStr=s.data_dzien1+'T'+(s.godzina_end_d1||'23:59')+':00';
  return new Date(dateStr)<new Date();
}
function fixLink(link){
  if(!link)return null;
  link=link.trim();
  if(link.startsWith('http://')||link.startsWith('https://'))return link;
  return'https://'+link;
}
function detectPlatform(link){
  if(!link)return'Online';
  if(link.toLowerCase().includes('zoom'))return'Zoom';
  if(link.toLowerCase().includes('meet.google'))return'Google Meet';
  if(link.toLowerCase().includes('teams'))return'Teams';
  return'Online';
}
function instructorName(zjazd){
  const zp=zjazd.zjazdy_prowadzacy;
  if(!zp||!zp.length)return null;
  const p=zp[0].prowadzacy;
  if(!p)return null;
  return p.imie+' '+p.nazwisko;
}

async function enrichLogs(logs){
  if(!logs.length)return logs;
  const zIds=[...new Set(logs.map(l=>l.zjazd_id).filter(Boolean))];
  const{data:zjazdy}=zIds.length
    ?await sb.from('zjazdy').select('id,tematy,data_dzien1,grupa_id').in('id',zIds)
    :{data:[]};
  const gIds=[...new Set((zjazdy||[]).map(z=>z.grupa_id).filter(Boolean))];
  const{data:grupy}=gIds.length
    ?await sb.from('grupy').select('id,nazwa,miasto,edycja').in('id',gIds)
    :{data:[]};
  const gMap={};(grupy||[]).forEach(g=>gMap[g.id]=g);
  const zMap={};(zjazdy||[]).forEach(z=>zMap[z.id]={...z,grupy:gMap[z.grupa_id]||null});
  return logs.map(l=>({...l,zjazdy:zMap[l.zjazd_id]||null}));
}
async function enrichSessions(sessions){
  if(!sessions.length)return sessions;
  const gIds=[...new Set(sessions.map(s=>s.grupa_id).filter(Boolean))];
  const zIds=sessions.map(s=>s.id);
  const[{data:grupy},{data:zp}]=await Promise.all([
    gIds.length?sb.from('grupy').select('id,nazwa,miasto,edycja').in('id',gIds):{data:[]},
    sb.from('zjazdy_prowadzacy').select('zjazd_id,prowadzacy(imie,nazwisko)').in('zjazd_id',zIds)
  ]);
  const gMap={};(grupy||[]).forEach(g=>gMap[g.id]=g);
  const pMap={};(zp||[]).forEach(r=>{if(!pMap[r.zjazd_id])pMap[r.zjazd_id]=r.prowadzacy;});
  return sessions.map(s=>({...s,grupy:gMap[s.grupa_id]||null,zjazdy_prowadzacy:pMap[s.id]?[{prowadzacy:pMap[s.id]}]:[]}));
}

  return data;
}
async function updateLog(id,obj){

function exportCSV(){
  const fl=filteredLogs();
  const hd=['Imię i nazwisko','Email','Temat zajęć','Grupa','Miasto','Edycja','Data','Godzina wejścia','Godzina wyjścia','Czas obecności (min)'];
  const rows=fl.map(l=>{
    const z=l.zjazdy;const g=z?.grupy;
    return[
      l.name,l.email,z?.tematy||'',g?.nazwa||'',g?.miasto||'',g?.edycja||'',
      l.entry_time?new Date(l.entry_time).toLocaleDateString('pl-PL'):'',
      l.entry_time?fTime(l.entry_time):'',
      l.exit_time?fTime(l.exit_time):'—',
      l.duration??'—'
    ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+[hd.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'}));
  a.download='raport_obecnosci_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function filteredLogs(){
  return S.logs.filter(l=>{
    const z=l.zjazdy;
    if(S.fg&&Number(z?.grupa_id)!==Number(S.fg))return false;
    if(S.fd&&l.entry_time&&new Date(l.entry_time).toISOString().slice(0,10)!==S.fd)return false;
    if(S.fs){const q=S.fs.toLowerCase();if(!l.name.toLowerCase().includes(q)&&!l.email.toLowerCase().includes(q))return false;}
    return true;
  });
}

/* ── RENDER ── */
function render(){
  const app=document.getElementById('app');if(!app)return;
  const v=S.view;
  if(v==='home')app.innerHTML=renderHome();
  else if(v==='student-login')app.innerHTML=renderStudentLogin();
  else if(v==='group-select')app.innerHTML=renderGroupSelect();
  else if(v==='student')app.innerHTML=renderStudent();
  else if(v==='join')app.innerHTML=renderJoin();
  else if(v==='active')app.innerHTML=renderActive();
  else if(v==='admin-login')app.innerHTML=renderAdminLogin();
  else if(v==='admin')app.innerHTML=renderAdmin();
  bind();
  if(v==='active')startTimer();
}

let timerInterval=null;
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    const el=document.getElementById('elapsed-display');
    if(!el||!S.activeLog){clearInterval(timerInterval);return;}
    el.textContent=Math.floor((Date.now()-new Date(S.activeLog.entry_time))/60000)+"'";
  },15000);
}

function bind(){
  document.querySelectorAll('[data-a]').forEach(function(el){
    el.onclick=function(e){e.stopPropagation();handle(el.dataset.a);};
  });
  const fg=document.getElementById('fg');if(fg)fg.onchange=function(){S.fg=fg.value;render();};
  const fs=document.getElementById('fs');if(fs)fs.oninput=function(){S.fs=fs.value;render();};
  const fdt=document.getElementById('fdt');if(fdt)fdt.onchange=function(){S.fd=fdt.value;render();};
  const apw=document.getElementById('apw');if(apw)apw.onkeydown=function(e){if(e.key==='Enter')handle('do-login');};
  const ste=document.getElementById('st-email');if(ste)ste.onkeydown=function(e){if(e.key==='Enter')handle('do-student-login');};
}

async function handle(a){
  if(a==='go-home'){S.view='home';render();}
  else if(a==='go-student'){S.view='student-login';render();}
  else if(a==='go-student-sessions'){S.view='student';render();}
  else if(a==='go-admin'){S.view='admin-login';render();}

  else if(a==='do-student-login'){
    const emailEl=document.getElementById('st-email');
    const errEl=document.getElementById('st-err');
    const btn=document.getElementById('st-btn');
    if(!emailEl?.value.trim()){if(errEl){errEl.textContent='Podaj adres e-mail.';errEl.style.display='block';}return;}
    if(btn)btn.disabled=true;
    const kursant=await findStudent(emailEl.value);
    if(!kursant){
      if(errEl){errEl.textContent='Nie znaleziono kursanta z tym adresem e-mail. Sprawdź czy adres jest poprawny lub skontaktuj się z biurem ON-ARCH.';errEl.style.display='block';}
      if(btn)btn.disabled=false;return;
    }
    if(!kursant.grupa_id){
      if(errEl){errEl.textContent='Twoje konto nie jest przypisane do żadnej grupy. Skontaktuj się z biurem ON-ARCH.';errEl.style.display='block';}
      if(btn)btn.disabled=false;return;
    }
    S.student=kursant;
    S.group=await fetchGroup(kursant.grupa_id);
    S.loading=true;S.view='student';render();
    S.sessions=await fetchSessionsForGroup(kursant.grupa_id);
    S.loading=false;render();
  }

  else if(a.startsWith('select-group-')){const gid=parseInt(a.replace('select-group-',''));S.group=S.groups.find(g=>g.id===gid)||S.groups[0];S.loading=true;S.view='student';render();S.sessions=await fetchSessionsForGroup(S.group.id);S.loading=false;render();}
  else if(a==='go-group-select'){S.view='group-select';render();}
  else if(a.startsWith('join-')){
    const id=parseInt(a.slice(5));
    S.joining=S.sessions.find(function(x){return x.id===id;});
    S.view='join';render();
  }

  else if(a==='confirm-join'){
    const btn=document.getElementById('join-btn');
    const err=document.getElementById('jerr');
    if(btn)btn.disabled=true;
    const log=await addLog({
      zjazd_id:S.joining.id,
      name:S.student.imie+' '+S.student.nazwisko,
      email:S.student.email,
      entry_time:new Date().toISOString()
    });
    if(log){
      S.activeLog=log;S.activeSess=S.joining;
      window.open(fixLink(S.joining.link_online),'_blank');
      S.view='active';render();
    }else{
      if(err){err.textContent='Błąd połączenia. Spróbuj ponownie.';err.style.display='block';}
      if(btn)btn.disabled=false;
    }
  }

  else if(a==='show-exit'){const c=document.getElementById('excf'),b=document.getElementById('exbtn');if(c)c.style.display='block';if(b)b.style.display='none';}
  else if(a==='cancel-exit'){const c=document.getElementById('excf'),b=document.getElementById('exbtn');if(c)c.style.display='none';if(b)b.style.display='block';}
  else if(a==='confirm-exit'){
    clearInterval(timerInterval);
    const exit=new Date().toISOString();
    const dur=Math.round((new Date(exit)-new Date(S.activeLog.entry_time))/60000);
    await updateLog(S.activeLog.id,{exit_time:exit,duration:dur});
    S.activeLog=null;S.activeSess=null;S.view='student';render();
  }

  else if(a==='do-login'){
    const pw=document.getElementById('apw');
    if(pw&&pw.value===PASS){
      S.loading=true;S.view='admin';render();
      const[rawSessions,rawLogs,groups]=await Promise.all([fetchAllSessions(),fetchAllLogs(),fetchOnlineGroups()]);
      S.allSessions=await enrichSessions(rawSessions);S.logs=await enrichLogs(rawLogs);S.allGroups=groups;S.loading=false;render();
    }else{
      const lerr=document.getElementById('lerr');if(lerr)lerr.style.display='block';
      const lc=document.getElementById('lc');if(lc){lc.style.animation='shake .4s ease';setTimeout(function(){lc.style.animation='';},450);}
    }
  }

  else if(a==='tab-sessions'){
    S.atab='sessions';S.loading=true;render();
    const[rawSessions,rawLogs,groups]=await Promise.all([fetchAllSessions(),fetchAllLogs(),fetchOnlineGroups()]);
    S.allSessions=await enrichSessions(rawSessions);S.logs=await enrichLogs(rawLogs);S.allGroups=groups;S.loading=false;render();
  }
  else if(a==='tab-reports'){
    S.atab='reports';S.loading=true;render();
    const[rawLogs,groups]=await Promise.all([fetchAllLogs(),fetchOnlineGroups()]);
    S.logs=await enrichLogs(rawLogs);S.allGroups=groups;S.loading=false;render();
  }

  else if(a==='export-pdf')generatePDF();
  else if(a==='export-csv')exportCSV();
  else if(a==='clear-f'){S.fg='';S.fd='';S.fs='';render();}
}

render();
</script>
</body>
</html>
