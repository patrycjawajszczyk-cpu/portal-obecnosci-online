<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON-ARCH — Portal Zajęć Online</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:#FAF8F5;min-height:100vh}
.pf{font-family:'Playfair Display',serif}
.btn{border:none;cursor:pointer;border-radius:8px;font-family:'Lato',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:11px 20px}
.btn:hover{opacity:.8}.btn:disabled{opacity:.4;cursor:not-allowed}
.bp{background:#AD6B68;color:#fff}.bs{background:transparent;color:#1A1A18;border:1.5px solid #C8BFB5}
.bg{background:#C9A84C;color:#1A1A18}.bd{background:#B94040;color:#fff}.bgh{background:transparent;color:#7A6E6A;border:1px solid #E0D8CE}
.card{background:#fff;border-radius:14px;border:1px solid #EAE4DC;box-shadow:0 2px 14px rgba(0,0,0,.05)}
.iw{display:flex;flex-direction:column;gap:5px}
.iw label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7A6E6A}
.iw input,.iw select{padding:10px 13px;border:1.5px solid #E0D8CE;border-radius:8px;font-family:'Lato',sans-serif;font-size:14px;color:#1A1A18;background:#fff;outline:none;width:100%}
.iw input:focus,.iw select:focus{border-color:#AD6B68}
.badge{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;display:inline-block}
.topbar{background:#fff;border-bottom:1px solid #EAE4DC;padding:15px 24px;display:flex;align-items:center;justify-content:space-between}
.content{max-width:700px;margin:0 auto;padding:32px 20px}
table{width:100%;border-collapse:collapse}
th{padding:11px 15px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:#2A2218;color:rgba(255,255,255,.65);white-space:nowrap}
td{padding:12px 15px;font-size:13px}
tr:nth-child(even) td{background:#FAF8F5}
tr:nth-child(odd) td{background:#fff}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@keyframes p2{0%,100%{box-shadow:0 0 0 4px rgba(173,107,104,.15)}50%{box-shadow:0 0 0 10px rgba(173,107,104,.04)}}
.overlay{position:fixed;inset:0;background:rgba(26,26,24,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
</style>
</head>

function fDate(d){return new Date(d+'T12:00:00').toLocaleDateString('pl-PL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}

#7A6E6A;margin-top:3px">Zarządzanie zajęciami i raporty</div></div></div></button></div><div style="width:52px;height:3px;background:#C9A84C;margin:44px auto 0;border-radius:2px"></div></div><div style="text-align:center;padding:18px;font-size:10px;color:#C8BFB5;letter-spacing:.1em">© ON-ARCH AKADEMIA PROJEKTOWANIA · ŁÓDŹ</div></div>';}
function renderStudent(){const up=[...S.sessions].filter(s=>!isPast(s)).sort((a,b)=>a.date.localeCompare(b.date));const pa=[...S.sessions].filter(s=>isPast(s)).sort((a,b)=>b.date.localeCompare(a.date));function card(s,showBtn){const pc=s.platform==='Google Meet'?'#34A853':'#2D8CFF';return'<div class="card" style="padding:22px 24px;'+(showBtn?'':'opacity:.6')+'">'+'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap"><div style="flex:1"><div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">'+badge(s.course,'#7A6E6A')+badge(s.platform,pc)+'</div><div class="pf" style="font-size:18px;font-weight:600;color:#1A1A18;margin-bottom:8px">'+s.topic+'</div><div style="font-size:13px;color:#7A6E6A">📅 '+fDate(s.date)+'</div><div style="font-size:13px;color:#7A6E6A;margin-top:4px">🕐 '+s.time+' · '+s.dur+' min · prowadzi <strong style="color:#1A1A18">'+s.instructor+'</strong></div></div>'+(showBtn?'<button class="btn bp" data-a="join-'+s.id+'" style="white-space:nowrap">Dołącz →</button>':'<span style="font-size:12px;color:#C8BFB5;font-style:italic">Zakończone</span>')+'</div></div>';}return'<div style="min-height:100vh;background:#FAF8F5">'+topbar('Portal studenta','go-home')+'<div class="content"><h2 class="pf" style="font-size:24px;color:#1A1A18;margin:0 0 22px">Zaplanowane zajęcia</h2>'+(up.length===0?'<div class="card" style="padding:40px;text-align:center"><div style="font-size:40px;margin-bottom:12px">📅</div><p style="color:#7A6E6A">Brak zaplanowanych zajęć</p></div>':'')+'<div style="display:flex;flex-direction:column;gap:14px">'+up.map(s=>card(s,true)).join('')+'</div>'+(pa.length>0?'<h3 class="pf" style="font-size:17px;color:#C8BFB5;margin:36px 0 14px">Archiwum zajęć</h3><div style="display:flex;flex-direction:column;gap:10px">'+pa.map(s=>card(s,false)).join('')+'</div>':'')+'</div></div>';}
function renderJoin(){const s=S.joining,sv=S.student||{name:'',email:''};return'<div style="min-height:100vh;background:#FAF8F5">'+topbar('Dołącz do zajęć','go-student')+'<div style="max-width:480px;margin:40px auto;padding:0 20px"><div class="card" style="overflow:hidden"><div style="background:#F5F0E8;border-bottom:1px solid #EAE4DC;padding:24px 28px"><div style="font-size:10px;color:#AD6B68;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:8px">'+s.course+'</div><h2 class="pf" style="font-size:21px;color:#1A1A18;margin:0 0 12px">'+s.topic+'</h2><div style="display:flex;gap:20px;flex-wrap:wrap"><span style="font-size:13px;color:#7A6E6A">📅 '+fDate(s.date)+'</span><span style="font-size:13px;color:#7A6E6A">🕐 '+s.time+' · '+s.dur+' min</span></div></div><div style="padding:28px"><p style="font-size:13px;color:#7A6E6A;margin:0 0 24px;line-height:1.7">Podaj swoje dane — zostaną zapisane w raporcie obecności. Po kliknięciu „Dołącz" otworzy się '+s.platform+' w nowej karcie.</p><div style="display:flex;flex-direction:column;gap:18px"><div class="iw"><label>Imię i nazwisko <span style="color:#AD6B68">*</span></label><input id="jn" value="'+sv.name+'" placeholder="np. Anna Kowalska"></div><div class="iw"><label>Adres e-mail <span style="color:#AD6B68">*</span></label><input id="je" type="email" value="'+sv.email+'" placeholder="anna@example.com"></div></div><div id="jerr" style="display:none;margin-top:14px;padding:10px 14px;background:#FEE2E2;border-radius:8px;font-size:13px;color:#B91C1C"></div><div style="margin-top:24px;display:flex;gap:12px;justify-content:flex-end"><button class="btn bs" data-a="go-student">Anuluj</button><button class="btn bp" data-a="confirm-join">Dołącz →</button></div><p style="font-size:11px;color:#C8BFB5;margin-top:16px;text-align:center;line-height:1.7">Dane wykorzystywane wyłącznie do raportów obecności dla dokumentacji kształcenia ustawicznego.</p></div></div></div></div>';}
function renderActive(){const s=S.activeSess,l=S.activeLog;const el=l?Math.floor((Date.now()-new Date(l.entry))/60000):0;return'<div style="min-height:100vh;background:#FAF8F5;display:flex;flex-direction:column"><div style="background:#fff;border-bottom:1px solid #EAE4DC;padding:16px 24px">'+logo()+'</div><div style="background:#AD6B68;padding:8px 0;text-align:center"><span style="font-size:10px;color:rgba(255,255,255,.9);letter-spacing:.16em;text-transform:uppercase;font-weight:700">● ZAJĘCIA W TOKU</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center"><div style="width:72px;height:72px;border-radius:50%;background:#fff;border:2px solid #EAE4DC;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:p2 2s infinite"><div style="width:14px;height:14px;border-radius:50%;background:#AD6B68"></div></div><h2 class="pf" style="font-size:clamp(20px,3vw,30px);color:#1A1A18;margin:0 0 8px;max-width:480px">'+(s?s.topic:'')+'</h2><p style="font-size:13px;color:#7A6E6A;margin:0 0 36px">'+(s?s.course:'')+' · '+(s?s.platform:'')+' · prowadzi '+(s?s.instructor:'')+'</p><div style="display:flex;gap:40px;margin-bottom:40px;flex-wrap:wrap;justify-content:center"><div style="text-align:center"><div class="pf" id="elapsed-display" style="font-size:46px;color:#C9A84C;font-weight:700">'+el+"'</div><div style=\"font-size:10px;color:#7A6E6A;letter-spacing:.1em;text-transform:uppercase;margin-top:4px\">czas obecności</div></div><div style=\"width:1px;background:#EAE4DC\"></div><div style=\"text-align:center\"><div class=\"pf\" style=\"font-size:46px;color:#1A1A18;font-weight:700\">"+(l?fTime(l.entry):'—')+'</div><div style="font-size:10px;color:#7A6E6A;letter-spacing:.1em;text-transform:uppercase;margin-top:4px">godzina wejścia</div></div></div><div style="background:#fff;border:1px solid #EAE4DC;border-radius:12px;padding:16px 24px;margin-bottom:36px;max-width:380px;font-size:13px;color:#7A6E6A;line-height:1.7">Zajęcia otworzyły się w nowej karcie. Po zakończeniu wróć tutaj i kliknij przycisk poniżej.</div><div id="excf" style="display:none;background:#FEF2F2;border:1px solid #FCA5A5;border-radius:12px;padding:24px;max-width:340px;margin-bottom:18px"><p style="color:#1A1A18;font-size:14px;margin-bottom:16px;line-height:1.6">Czy na pewno chcesz zakończyć udział w zajęciach?</p><div style="display:flex;gap:10px;justify-content:center"><button class="btn bgh" data-a="cancel-exit">Anuluj</button><button class="btn bd" data-a="confirm-exit">Tak, kończę zajęcia</button></div></div><button class="btn bd" id="exbtn" data-a="show-exit" style="font-size:12px">Zakończ udział w zajęciach</button></div></div>';}
function renderAdminLogin(){return'<div style="min-height:100vh;background:#FAF8F5;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px"><div style="margin-bottom:28px">'+logo()+'</div><div id="lc" class="card" style="padding:36px 32px;width:100%;max-width:360px"><h2 class="pf" style="font-size:20px;color:#1A1A18;margin:0 0 6px">Panel administracyjny</h2><p style="font-size:13px;color:#7A6E6A;margin:0 0 24px">Wprowadź hasło dostępu</p><div class="iw"><label>Hasło</label><input id="apw" type="password" placeholder="••••••••"></div><div id="lerr" style="display:none;margin-top:12px;font-size:13px;color:#B91C1C;padding:9px 13px;background:#FEE2E2;border-radius:8px">Nieprawidłowe hasło</div><div style="margin-top:24px;display:flex;gap:10px"><button class="btn bs" data-a="go-home" style="flex:1;justify-content:center">Wróć</button><button class="btn bp" data-a="do-login" style="flex:2;justify-content:center">Zaloguj →</button></div></div></div>';}
function renderAdmin(){const t=S.atab;return'<div style="min-height:100vh;background:#FAF8F5">'+topbar('Administrator','go-home')+'<div style="background:#fff;border-bottom:1px solid #EAE4DC;padding:0 24px;display:flex">'+['sessions','reports'].map((k,i)=>'<button data-a="tab-'+k+'" style="background:transparent;border:none;border-bottom:'+(t===k?'3px solid #AD6B68':'3px solid transparent')+';padding:14px 18px;cursor:pointer;font-family:\'Lato\',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:'+(t===k?'#AD6B68':'#7A6E6A')+'">'+['Harmonogram zajęć','Raporty obecności'][i]+'</button>').join('')+'</div><div style="max-width:880px;margin:0 auto;padding:32px 20px">'+(t==='sessions'?renderSessions():renderReports())+'</div>'+(S.addOpen?renderModal():'')+'</div>';}
function renderSessions(){const sorted=[...S.sessions].sort((a,b)=>a.date.localeCompare(b.date));const cards=sorted.map(s=>{const pc=s.platform==='Google Meet'?'#34A853':'#2D8CFF';const sl=S.logs.filter(l=>l.sid===s.id);return'<div class="card" style="padding:20px 24px"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap"><div style="flex:1"><div style="display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap">'+badge(s.course,'#7A6E6A')+badge(s.platform,pc)+(isPast(s)?badge('Zakończone','#C8BFB5'):'')+'</div><div class="pf" style="font-size:17px;font-weight:600;color:#1A1A18;margin-bottom:6px">'+s.topic+'</div><div style="font-size:13px;color:#7A6E6A">'+fDate(s.date)+' · '+s.time+' · '+s.dur+' min · '+s.instructor+'</div>'+(sl.length>0?'<div style="margin-top:6px;font-size:12px;color:#5C8A6E;font-weight:700">✓ '+sl.length+' '+(sl.length===1?'student':'studentów')+' w raporcie</div>':'')+'</div><div style="display:flex;gap:8px;align-items:center"><a href="'+s.link+'" target="_blank" style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#1A1A18;text-decoration:none;border:1px solid #EAE4DC;border-radius:8px;padding:8px 14px">Link ↗</a><button data-a="del-'+s.id+'" style="background:none;border:none;cursor:pointer;font-size:15px;color:#C8BFB5;padding:8px;border-radius:8px">🗑</button></div></div></div>';}).join('');return'<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px"><h2 class="pf" style="font-size:22px;color:#1A1A18">Harmonogram zajęć</h2><button class="btn bp" data-a="open-add">+ Dodaj zajęcia</button></div>'+(sorted.length===0?'<div class="card" style="padding:40px;text-align:center"><div style="font-size:40px;margin-bottom:12px">📅</div><p style="color:#7A6E6A">Brak zajęć. Dodaj pierwsze!</p></div>':'<div style="display:flex;flex-direction:column;gap:14px">'+cards+'</div>')+'</div>';}
function renderReports(){const fl=filteredLogs();const avg=fl.length>0?Math.round(fl.reduce((a,l)=>a+(l.dur||0),0)/fl.length):0;const rows=fl.map(l=>{const s=S.sessions.find(x=>x.id===l.sid);return'<tr><td><div style="font-weight:700;color:#1A1A18">'+l.name+'</div><div style="font-size:11px;color:#7A6E6A">'+l.email+'</div></td><td><div style="font-size:10px;color:#AD6B68;font-weight:700;margin-bottom:2px">'+(s?.course||'')+'</div><div style="font-size:12px;color:#1A1A18">'+(s?.topic||'')+'</div></td><td style="white-space:nowrap;color:#1A1A18">'+(l.entry?new Date(l.entry).toLocaleDateString('pl-PL'):'—')+'</td><td style="white-space:nowrap;font-weight:700;color:#5C8A6E">'+(l.entry?fTime(l.entry):'—')+'</td><td style="white-space:nowrap;color:#1A1A18">'+(l.exit?fTime(l.exit):'—')+'</td><td><span style="display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;background:'+(l.dur?'#EAF4EE':'#FAF8F5')+';color:'+(l.dur?'#5C8A6E':'#C8BFB5')+'">'+(l.dur??'—')+'</span></td></tr>';}).join('');return'<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px"><h2 class="pf" style="font-size:22px;color:#1A1A18">Raporty obecności</h2><button class="btn bg" data-a="export-csv"'+(fl.length===0?' disabled':'')+'>⬇ Eksportuj CSV</button></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px">'+[['Logowań łącznie',fl.length,'#AD6B68'],['Śr. czas obecności',avg+' min','#C9A84C'],['Sesji z danymi',[...new Set(fl.map(l=>l.sid))].length,'#5C8A6E']].map(function(x){return'<div class="card" style="padding:18px 22px"><div class="pf" style="font-size:28px;font-weight:700;color:'+x[2]+'">'+x[1]+'</div><div style="font-size:10px;color:#7A6E6A;letter-spacing:.08em;text-transform:uppercase;margin-top:4px">'+x[0]+'</div></div>';}).join('')+'</div><div class="card" style="padding:18px 22px;margin-bottom:16px"><div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end"><div class="iw" style="min-width:210px"><label>Filtruj po kursie</label><select id="fc"><option value="">Wszystkie kursy</option>'+COURSES.map(function(c){return'<option value="'+c+'"'+(S.fc===c?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div><div class="iw" style="min-width:160px"><label>Filtruj po dacie</label><input type="date" id="fdt" value="'+S.fd+'"></div>'+(S.fc||S.fd?'<button class="btn bgh" data-a="clear-f">Wyczyść filtry</button>':'')+'</div></div>'+(fl.length===0?'<div class="card" style="padding:40px;text-align:center"><div style="font-size:40px;margin-bottom:12px">📊</div><p style="color:#7A6E6A">'+(S.logs.length===0?'Brak zarejestrowanych obecności.':'Brak wyników dla wybranych filtrów.')+'</p></div>':'<div class="card" style="overflow:hidden"><div style="overflow-x:auto"><table><thead><tr><th>Imię i nazwisko</th><th>Kurs / Temat</th><th>Data</th><th>Wejście</th><th>Wyjście</th><th>Czas (min)</th></tr></thead><tbody>'+rows+'</tbody></table></div><div style="padding:12px 18px;background:#FAF8F5;border-top:1px solid #EAE4DC;font-size:12px;color:#7A6E6A">Wyświetlono '+fl.length+' zapisów</div></div>')+'</div>';}
function renderModal(){const f=S.form;return'<div class="overlay"><div class="card" style="padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h3 class="pf" style="font-size:19px;color:#1A1A18">Nowe zajęcia</h3><button data-a="close-add" style="background:none;border:none;font-size:20px;cursor:pointer;color:#7A6E6A;line-height:1">×</button></div><div style="display:flex;flex-direction:column;gap:16px"><div class="iw"><label>Kurs <span style="color:#AD6B68">*</span></label><select id="af-c">'+COURSES.map(function(c){return'<option'+(f.course===c?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div><div class="iw"><label>Temat zajęć <span style="color:#AD6B68">*</span></label><input id="af-t" value="'+f.topic+'" placeholder="np. Teoria koloru w przestrzeni"></div><div class="iw"><label>Prowadzący <span style="color:#AD6B68">*</span></label><input id="af-i" value="'+f.instructor+'" placeholder="Imię i nazwisko prowadzącego"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="iw"><label>Data <span style="color:#AD6B68">*</span></label><input id="af-d" type="date" value="'+f.date+'"></div><div class="iw"><label>Godzina</label><input id="af-tm" type="time" value="'+f.time+'"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="iw"><label>Czas trwania (min)</label><input id="af-dur" type="number" value="'+f.dur+'"></div><div class="iw"><label>Platforma</label><select id="af-p"><option'+(f.platform==='Google Meet'?' selected':'')+'>Google Meet</option><option'+(f.platform==='Zoom'?' selected':'')+'>Zoom</option></select></div></div><div class="iw"><label>Link do spotkania <span style="color:#AD6B68">*</span></label><input id="af-l" value="'+f.link+'" placeholder="https://meet.google.com/..."></div></div>'+(S.ferr?'<div style="margin-top:14px;padding:10px 14px;background:#FEE2E2;border-radius:8px;font-size:13px;color:#B91C1C">'+S.ferr+'</div>':'')+'<div style="margin-top:22px;display:flex;gap:12px;justify-content:flex-end"><button class="btn bs" data-a="close-add">Anuluj</button><button class="btn bp" data-a="save-add">Dodaj zajęcia</button></div></div></div>';}
function render(){const app=document.getElementById('app');if(!app)return;const v=S.view;if(v==='home')app.innerHTML=renderHome();else if(v==='student')app.innerHTML=renderStudent();else if(v==='join')app.innerHTML=renderJoin();else if(v==='active')app.innerHTML=renderActive();else if(v==='admin-login')app.innerHTML=renderAdminLogin();else if(v==='admin')app.innerHTML=renderAdmin();bind();if(v==='active')startTimer();}
let timerInterval=null;
function startTimer(){clearInterval(timerInterval);timerInterval=setInterval(function(){const el=document.getElementById('elapsed-display');if(!el||!S.activeLog){clearInterval(timerInterval);return;}el.textContent=Math.floor((Date.now()-new Date(S.activeLog.entry))/60000)+"'";},15000);}
function bind(){document.querySelectorAll('[data-a]').forEach(function(el){el.onclick=function(e){e.stopPropagation();handle(el.dataset.a);};});const fc=document.getElementById('fc');if(fc)fc.onchange=function(){S.fc=fc.value;render();};const fdt=document.getElementById('fdt');if(fdt)fdt.onchange=function(){S.fd=fdt.value;render();};const apw=document.getElementById('apw');if(apw)apw.onkeydown=function(e){if(e.key==='Enter')handle('do-login');};}
function handle(a){if(a==='go-home'){S.view='home';render();}else if(a==='go-student'){S.view='student';render();}else if(a==='go-admin'){S.view='admin-login';render();}else if(a==='do-login'){const pw=document.getElementById('apw');if(pw&&pw.value===PASS){S.view='admin';render();}else{const lerr=document.getElementById('lerr');if(lerr)lerr.style.display='block';const lc=document.getElementById('lc');if(lc){lc.style.animation='shake .4s ease';setTimeout(function(){lc.style.animation='';},450);}}}else if(a.startsWith('join-')){S.joining=S.sessions.find(function(x){return x.id===a.slice(5);});S.view='join';render();}else if(a==='confirm-join'){const n=document.getElementById('jn'),e=document.getElementById('je'),err=document.getElementById('jerr');if(!n?.value.trim()||!e?.value.trim()){if(err){err.textContent='Wypełnij wszystkie pola.';err.style.display='block';}return;}if(!e.value.includes('@')){if(err){err.textContent='Podaj prawidłowy adres email.';err.style.display='block';}return;}S.student={name:n.value.trim(),email:e.value.trim()};const log={id:'l'+Date.now(),sid:S.joining.id,name:S.student.name,email:S.student.email,entry:new Date().toISOString(),exit:null,dur:null};S.logs.push(log);S.activeLog=log;S.activeSess=S.joining;window.open(S.joining.link,'_blank');S.view='active';render();}else if(a==='show-exit'){const c=document.getElementById('excf'),b=document.getElementById('exbtn');if(c)c.style.display='block';if(b)b.style.display='none';}else if(a==='cancel-exit'){const c=document.getElementById('excf'),b=document.getElementById('exbtn');if(c)c.style.display='none';if(b)b.style.display='block';}else if(a==='confirm-exit'){clearInterval(timerInterval);const exit=new Date().toISOString();const l=S.logs.find(function(x){return x.id===S.activeLog.id;});if(l){l.exit=exit;l.dur=Math.round((new Date(exit)-new Date(l.entry))/60000);}S.activeLog=null;S.activeSess=null;S.view='student';render();}else if(a==='tab-sessions'){S.atab='sessions';render();}else if(a==='tab-reports'){S.atab='reports';render();}else if(a==='open-add'){S.addOpen=true;S.ferr='';render();}else if(a==='close-add'){S.addOpen=false;render();}else if(a==='save-add'){const t=document.getElementById('af-t'),i=document.getElementById('af-i'),d=document.getElementById('af-d'),l=document.getElementById('af-l');if(!t?.value||!i?.value||!d?.value||!l?.value){S.ferr='Wypełnij wszystkie wymagane pola.';render();return;}S.sessions.push({id:'s'+Date.now(),course:document.getElementById('af-c').value,topic:t.value,instructor:i.value,date:d.value,time:document.getElementById('af-tm').value,dur:Number(document.getElementById('af-dur').value),platform:document.getElementById('af-p').value,link:l.value});S.addOpen=false;S.ferr='';render();}else if(a.startsWith('del-')){if(confirm('Czy na pewno chcesz usunąć te zajęcia?'))S.sessions=S.sessions.filter(function(s){return s.id!==a.slice(4);});render();}else if(a==='export-csv')exportCSV();else if(a==='clear-f'){S.fc='';S.fd='';render();}}
render();
</script>
